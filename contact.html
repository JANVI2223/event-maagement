<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>EventManager - Contact</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand fw-bold"
           href="index.html">

            EventManager

        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link"
                       href="index.html">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="events.html">
                        Events
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="about.html">
                        About
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active"
                       href="contact.html">
                        Contact
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- Header -->
<section class="bg-primary text-white text-center py-5">

    <div class="container">

        <h1>Register for an Event</h1>

        <p class="lead">
            Fill the form below to register
        </p>

    </div>

</section>

<!-- Contact Form -->
<section class="py-5">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-md-7">

                <div class="card shadow">

                    <div class="card-body p-4">

                        <h3 class="text-center mb-4">
                            Event Registration
                        </h3>

                        <form>

                            <div class="mb-3">

                                <label class="form-label">
                                    Full Name
                                </label>

                                <input type="text"
                                       class="form-control"
                                       placeholder="Enter your name"
                                       required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Email
                                </label>

                                <input type="email"
                                       class="form-control"
                                       placeholder="Enter your email"
                                       required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Phone Number
                                </label>

                                <input type="tel"
                                       class="form-control"
                                       placeholder="Enter phone number"
                                       required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Select Event
                                </label>

                                <select class="form-select">

                                    <option>
                                        Select an event
                                    </option>

                                    <option>
                                        College Fest
                                    </option>

                                    <option>
                                        Business Conference
                                    </option>

                                    <option>
                                        Music Night
                                    </option>

                                    <option>
                                        Tech Workshop
                                    </option>

                                    <option>
                                        Art Exhibition
                                    </option>

                                    <option>
                                        Sports Day
                                    </option>

                                </select>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Message
                                </label>

                                <textarea class="form-control"
                                          rows="4"
                                          placeholder="Enter your message">
                                </textarea>

                            </div>

                            <div class="d-grid">

                                <button type="submit"
                                        class="btn btn-primary">

                                    Submit Registration

                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- Footer -->
<footer class="bg-dark text-white text-center py-3">

    <p class="mb-0">
        © 2026 EventManager. All Rights Reserved.
    </p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
